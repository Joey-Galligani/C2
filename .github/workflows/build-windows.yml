name: Build Windows C2 Client

on: 
  push: 
    paths:
      - 'Agent/**'  # Only trigger when Agent files change
      - '.github/workflows/build-windows.yml'  # Or workflow itself changes
  pull_request:
    paths:
      - 'Agent/**'
  workflow_dispatch:   # Manual trigger

jobs:
  build-windows:
    runs-on:  windows-latest
    
    # Set default working directory for all steps
    defaults:
      run:
        working-directory: Agent
    
    steps:
      - name:  Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:  
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Obfuscate code
        working-directory:  Agent/build_scripts
        run: python obfuscate.py
      
      - name: Build Windows executable
        run: |
          pip install pyinstaller
          pyinstaller --onefile --paths=build/obf --hidden-import pyarmor_runtime_000000 build/obf/src/run.py
      
      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: c2-client-windows-${{ github.ref_name }}
          path: Agent/dist/run.exe
          retention-days: 1
      
      - name: Display build info
        run: |
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Build completed successfully!"
          dir dist
