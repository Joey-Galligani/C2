<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse Shell Terminal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #121212;
            color: #4ade80;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        
        /* Background grid effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(74, 222, 128, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74, 222, 128, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 0;
        }
        
        /* Subtle scanline effect */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1;
            animation: scanline 8s linear infinite;
        }
        
        @keyframes scanline {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }
        
        .header {
            background: #1a1a1a;
            padding: 15px 25px;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            z-index: 10;
        }
        
        .header h1 {
            font-size: 1.1rem;
            color: #4ade80;
            font-weight: 500;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            background: #1a1a1a;
            border: 1px solid #333;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .status::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.1), 
                transparent
            );
            transition: left 0.5s ease;
        }
        
        .status:hover::before {
            left: 100%;
        }
        
        .status.listening {
            background: #1a1a1a;
            color: #4ade80;
            border-color: #4ade80;
        }
        
        .status.connected {
            background: #4ade80;
            color: #121212;
            border-color: #4ade80;
            font-weight: 600;
        }
        
        .status.error {
            background: linear-gradient(135deg, #3d1a1a 0%, #2a0f0f 100%);
            color: #ff4444;
            border-color: #ff4444;
            box-shadow: 
                0 0 10px rgba(255, 68, 68, 0.4),
                inset 0 0 10px rgba(255, 68, 68, 0.1);
            animation: pulse-error 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse-error {
            0%, 100% { 
                box-shadow: 
                    0 0 10px rgba(255, 68, 68, 0.4),
                    inset 0 0 10px rgba(255, 68, 68, 0.1);
            }
            50% { 
                box-shadow: 
                    0 0 20px rgba(255, 68, 68, 0.6),
                    inset 0 0 15px rgba(255, 68, 68, 0.2);
            }
        }
        
        #port-info {
            margin-left: auto;
            color: #888;
            font-size: 0.9rem;
            padding: 6px 12px;
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid rgba(0, 255, 65, 0.2);
            border-radius: 4px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        #port-info:hover {
            background: rgba(0, 255, 65, 0.1);
            border-color: rgba(0, 255, 65, 0.4);
            color: #00ff41;
        }
        
        #terminal-container {
            flex-grow: 1;
            padding: 15px;
            position: relative;
            z-index: 5;
            background: rgba(10, 10, 10, 0.5);
        }
        
        .xterm {
            height: 100%;
            border-radius: 4px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 
                inset 0 0 30px rgba(0, 255, 65, 0.1),
                0 0 20px rgba(0, 0, 0, 0.5);
        }
        
        .xterm-viewport {
            border-radius: 4px;
        }
        
        .xterm-screen {
            border-radius: 4px;
        }
        
        /* Cursor improvement */
        .xterm-cursor-layer {
            z-index: 2;
        }
        
        /* Custom scrollbar */
        .xterm-viewport::-webkit-scrollbar {
            width: 10px;
        }
        
        .xterm-viewport::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }
        
        .xterm-viewport::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 65, 0.3);
            border-radius: 5px;
        }
        
        .xterm-viewport::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 65, 0.5);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🐚 Reverse Shell Terminal</h1>
        <span id="status" class="status">Initializing...</span>
        <span id="port-info" style="margin-left: auto; color: #888;"></span>
    </div>
    <div id="terminal-container"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const port = params.get('port') || '4444';
        
        document.title = `Reverse Shell - Port ${port}`;
        document.getElementById('port-info').textContent = `Port: ${port}`;

        const statusEl = document.getElementById('status');
        const terminalContainer = document.getElementById('terminal-container');

        // Initialize xterm
        const terminal = new Terminal({
            cursorBlink: true,
            cursorStyle: 'block',
            fontSize: 14,
            lineHeight: 1.2,
            letterSpacing: 0.5,
            fontFamily: "'JetBrains Mono', 'Courier New', monospace",
            fontWeight: 400,
            theme: {
                background: '#121212',
                foreground: '#e0e0e0',
                cursor: '#4ade80',
                cursorAccent: '#121212',
                selectionBackground: 'rgba(74, 222, 128, 0.3)',
                selectionForeground: '#ffffff',
                black: '#000000',
                red: '#ff4444',
                green: '#4ade80',
                yellow: '#ffaa00',
                blue: '#4488ff',
                magenta: '#ff44ff',
                cyan: '#00ffff',
                white: '#ffffff',
                brightBlack: '#666666',
                brightRed: '#ff6666',
                brightGreen: '#4ade80',
                brightYellow: '#ffcc66',
                brightBlue: '#6699ff',
                brightMagenta: '#ff66ff',
                brightCyan: '#66ffff',
                brightWhite: '#ffffff'
            },
            allowTransparency: true,
            macOptionIsMeta: true,
            macOptionClickForcesSelection: true
        });

        const fitAddon = new FitAddon.FitAddon();
        terminal.loadAddon(fitAddon);
        terminal.open(terminalContainer);
        fitAddon.fit();

        window.addEventListener('resize', () => fitAddon.fit());

        terminal.writeln('\x1b[32m╔════════════════════════════════════════════╗\x1b[0m');
        terminal.writeln('\x1b[32m║       REVERSE SHELL TERMINAL               ║\x1b[0m');
        terminal.writeln('\x1b[32m╚════════════════════════════════════════════╝\x1b[0m');
        terminal.writeln('');
        terminal.writeln(`\x1b[33m[*] Launching: nc -lvnp ${port}\x1b[0m`);
        terminal.writeln('\x1b[33m[*] Waiting for connection...\x1b[0m');
        terminal.writeln('');

        statusEl.textContent = 'Listening...';
        statusEl.className = 'status listening';

        const wsUrl = `ws://${window.location.hostname}:8000/terminal/${port}`;
        const ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            terminal.writeln('\x1b[32m[+] Listener active, waiting for agent...\x1b[0m');
        };

        ws.onmessage = (event) => {
            if (statusEl.textContent !== 'Connected') {
                statusEl.textContent = 'Connected';
                statusEl.className = 'status connected';
                terminal.writeln('\x1b[32m[+] Agent connected!\x1b[0m');
                terminal.writeln('');
            }
            terminal.write(event.data);
        };

        ws.onclose = () => {
            terminal.writeln('');
            terminal.writeln('\x1b[31m[-] Connection closed.\x1b[0m');
            statusEl.textContent = 'Disconnected';
            statusEl.className = 'status error';
        };

        ws.onerror = (error) => {
            terminal.writeln(`\x1b[31m[!] WebSocket Error\x1b[0m`);
            statusEl.textContent = 'Error';
            statusEl.className = 'status error';
        };

        terminal.onData(data => {
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(data);
            }
        });
    </script>
</body>
</html>
